<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CZM • Inventory</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="/style.css" />
  <style>
    .brand-bar{background:#0f1114;border-bottom:4px solid #c30000}
    .brand-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:8px 12px}
    .brand-logo{display:flex;align-items:center;gap:10px;color:#fff;text-decoration:none}
    .brand-logo img{height:22px;opacity:.95}
    .brand-title{font-size:16px;margin:0;color:#fff}
    .brand-actions .navbtn{display:inline-block;background:#1a1c20;color:#bbb;padding:6px 12px;border-radius:10px;text-decoration:none;border:1px solid #3a3f44;font-weight:600;font-size:.9rem;margin-left:8px}
    .brand-actions .navbtn.active{background:#b30000;color:#fff;border-color:#ff4d4d}
    .brand-actions .navbtn:hover{background:#24272b;color:#fff}

    body{background:#eef0f3;margin:0}

    .inventory-shell{max-width:1200px;margin:24px auto;background:#fff;border-radius:6px;box-shadow:0 2px 4px rgba(0,0,0,.08);padding:0 0 12px}
    .inventory-header{padding:14px 16px 6px}
    .inventory-header h1{margin:0;font-size:20px}
    .inventory-sub{color:#666;margin:6px 0 0;font-size:13px}
    .toolbar{display:flex;gap:10px;flex-wrap:wrap;padding:10px 16px 0;align-items:center}
    .toolbar .spacer{flex:1}
    .toolbar input,.toolbar select{padding:9px 10px;border:1px solid #cfd6df;border-radius:10px;font-size:14px}
    .toolbar input{min-width:260px}
    .toolbar-btn{padding:9px 12px;border-radius:10px;border:1px solid #cfd6df;background:#fff;cursor:pointer;font-weight:700}
    .toolbar-btn.red{background:#c30000;color:#fff;border-color:#a70000}
    .toolbar-btn.red:hover{filter:brightness(.95)}
    .toolbar-btn:disabled{opacity:.5;cursor:not-allowed}

    .list-head{display:grid;grid-template-columns: 130px 1fr 140px 120px;gap:12px;padding:12px 16px;border-bottom:1px solid #e6e9ef;color:#777;font-size:12px;font-weight:800}
    .list-body{padding:0}
    .row{display:grid;grid-template-columns: 130px 1fr 140px 120px;gap:12px;padding:12px 16px;border-bottom:1px solid #eef1f5;align-items:center}
    .row:hover{background:#fafbfc}
    .mono{font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace}
    .qty{font-weight:900}
    .pill{display:inline-block;padding:4px 8px;border-radius:999px;font-size:12px;font-weight:800;background:#eef1f5;color:#333}
    .pill.low{background:#fff0f0;color:#b10000}
    .pill.ok{background:#effaf1;color:#0b6b20}
    .pill.na{background:#f3f4f6;color:#666}
    .row .actions{display:flex;gap:8px;justify-content:flex-end}
    .row .actions button{padding:7px 10px;border-radius:10px;border:1px solid #cfd6df;background:#fff;cursor:pointer;font-weight:800}
    .row .actions button:hover{background:#f5f7fa}
    .row .actions .danger{border-color:#ffb3b3;color:#a10000}
    .row .actions .danger:hover{background:#fff0f0}

    .muted{color:#666}
    .empty{padding:18px 16px;color:#666}

    .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.35);display:none;align-items:center;justify-content:center;padding:18px;z-index:50}
    .modal{background:#fff;border-radius:14px;max-width:560px;width:100%;box-shadow:0 10px 30px rgba(0,0,0,.25);overflow:hidden}
    .modal h2{margin:0;padding:14px 16px;border-bottom:1px solid #eef1f5;font-size:18px}
    .modal .content{padding:14px 16px}
    .grid2{display:grid;grid-template-columns: 1fr 1fr;gap:10px}
    .grid1{display:grid;grid-template-columns: 1fr;gap:10px}
    label{display:block;font-weight:800;font-size:12px;color:#333;margin-bottom:4px}
    input[type="text"],input[type="number"],textarea{width:100%;box-sizing:border-box;padding:10px;border:1px solid #cfd6df;border-radius:10px;font-size:14px}
    textarea{min-height:90px;resize:vertical}
    .modal .actions{display:flex;gap:10px;justify-content:flex-end;padding:12px 16px;border-top:1px solid #eef1f5;background:#fafbfc}
    .btn{padding:9px 14px;border-radius:10px;border:1px solid #cfd6df;background:#fff;font-weight:900}
    .btn:hover{background:#f5f7fa}
    .btn-red{background:#c30000;color:#fff;border-color:#a70000}
    .btn-gray{background:#c5c5c5;color:#000}

    /* detail view */
    .detail-wrap{padding:16px; position:relative;}
    .detail-qr-float{
      position:absolute; top:12px; right:12px;
      width:175px; text-align:center;
      border:1px solid #e5e9ef; border-radius:10px; background:#fff;
      padding:8px;
    }
    .detail-qr-float canvas{display:block; margin:0 auto; border:1px solid #e5e9ef; border-radius:8px; background:#fff;}
    .detail-qr-float .qr-part{margin-top:6px;font-weight:800;font-size:11px;word-break:break-all;line-height:1.05}
    .detail-qr-float .qr-name{margin-top:2px;font-size:10px;color:#333;line-height:1.05}
    .detail-qr-float .qr-link{margin-top:6px;font-size:10px;color:#777;word-break:break-all}
    .detail-qr-float .qr-btn{margin-top:8px}
    .detail-topbar{display:flex;gap:10px;justify-content:space-between;align-items:center;margin-bottom:12px}
    .detail-grid{display:grid;grid-template-columns: 180px 1fr;gap:8px 12px;max-width:720px}
    .detail-grid b{color:#333}
    .detail-qty{font-size:18px;font-weight:900}

    @media (max-width: 860px){
      .list-head,.row{grid-template-columns: 120px 1fr 110px 120px}
      .toolbar input{min-width:180px}
      .detail-qr-float{position:static;margin-bottom:12px;width:100%}
      .detail-grid{grid-template-columns: 140px 1fr}
    }
  </style>
</head>
<body>
  <div class="brand-bar">
    <div class="brand-inner">
      <a class="brand-logo" href="/dashboard.html">
        <img src="/czm.png" alt="CZM">
        <h1 class="brand-title">CZM Wireshop</h1>
      </a>
      <div class="brand-actions" id="navActions"></div>
    </div>
  </div>

  <div class="inventory-shell">
    <div class="inventory-header">
      <h1>Inventory</h1>
      <div class="inventory-sub">Search parts, view details, and manage quantities.</div>
    </div>

    <div class="toolbar">
      <input id="searchBox" type="text" placeholder="Search by part # or description..." />
      <select id="filterSelect">
        <option value="all">All</option>
        <option value="low">Low Stock</option>
      </select>
      <div class="spacer"></div>
      <button class="toolbar-btn red" id="addBtn">+ Add Part</button>
      <button class="toolbar-btn" id="refreshBtn">Refresh</button>
    </div>

    <div class="list-head">
      <div>Part #</div>
      <div>Description</div>
      <div>Qty</div>
      <div style="text-align:right;">Actions</div>
    </div>
    <div class="list-body" id="listBody">
      <div class="empty">Loading…</div>
    </div>
  </div>

  <!-- modal -->
  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal">
      <h2 id="modalTitle">Add Part</h2>
      <div class="content">
        <div class="grid2">
          <div>
            <label>Part Number</label>
            <input id="mPart" type="text" placeholder="e.g., 40602.4751.000" />
          </div>
          <div>
            <label>Quantity</label>
            <input id="mQty" type="number" min="0" step="1" placeholder="0" />
          </div>
        </div>
        <div class="grid1" style="margin-top:10px;">
          <div>
            <label>Description</label>
            <input id="mDesc" type="text" placeholder="e.g., SM HEADMAST HARNESS V3" />
          </div>
          <div>
            <label>Notes</label>
            <textarea id="mNotes" placeholder="Optional notes..."></textarea>
          </div>
        </div>
      </div>
      <div class="actions">
        <button class="btn btn-gray" id="cancelBtn">Cancel</button>
        <button class="btn btn-red" id="saveBtn">Save</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>

  <script>
    const API_BASE = 'https://wireshop-backend.onrender.com/api';

    function getUser(){
      try { return JSON.parse(localStorage.getItem('user') || 'null'); }
      catch { return null; }
    }
    function isAdminUser(user){ return !!user && (user.role === 'admin' || user.isAdmin); }

    function buildNav(){
      const user = getUser();
      const nav = document.getElementById('navActions');
      const isAdmin = isAdminUser(user);
      nav.innerHTML = `
        <a class="navbtn" href="/dashboard.html">Dashboard</a>
        <a class="navbtn active" href="/inventory.html">Inventory</a>
        <a class="navbtn" href="/inventory-list.html">Inventory List</a>
        <a class="navbtn" href="/shop-inventory.html">Shop Inventory</a>
        ${isAdmin ? `<a class="navbtn" href="/admin.html">Admin</a>` : ``}
        <a class="navbtn" href="/index.html" id="logoutBtn">Logout</a>
      `;
      const logoutBtn = document.getElementById('logoutBtn');
      if(logoutBtn){
        logoutBtn.addEventListener('click', (e)=>{
          e.preventDefault();
          localStorage.removeItem('user');
          window.location.href = '/index.html';
        });
      }
    }

    function qs(name){
      const p = new URLSearchParams(window.location.search);
      return p.get(name);
    }

    async function api(path, opts={}){
      const user = getUser();
      const headers = Object.assign({'Content-Type':'application/json'}, opts.headers||{});
      if(user && user.token) headers['Authorization'] = `Bearer ${user.token}`;
      const res = await fetch(`${API_BASE}${path}`, Object.assign({}, opts, {headers}));
      if(!res.ok){
        let msg = `Request failed (${res.status})`;
        try{
          const j = await res.json();
          if(j && j.error) msg = j.error;
        }catch{}
        throw new Error(msg);
      }
      return res.json();
    }

    function stockPill(qty){
      const n = Number(qty||0);
      if(Number.isNaN(n)) return `<span class="pill na">N/A</span>`;
      if(n <= 0) return `<span class="pill low">OUT</span>`;
      if(n <= 3) return `<span class="pill low">LOW</span>`;
      return `<span class="pill ok">OK</span>`;
    }

    function fmtQty(qty){
      const n = Number(qty||0);
      if(Number.isNaN(n)) return '—';
      return String(n);
    }

    let allRows = [];
    let currentMode = 'list';
    let currentDetail = null;

    async function loadList(){
      currentMode = 'list';
      const listBody = document.getElementById('listBody');
      listBody.innerHTML = `<div class="empty">Loading…</div>`;
      try{
        const data = await api('/inventory');
        allRows = Array.isArray(data) ? data : (data.rows || []);
        renderList();
      }catch(e){
        listBody.innerHTML = `<div class="empty">Error: ${e.message}</div>`;
      }
    }

    function renderList(){
      const search = (document.getElementById('searchBox').value || '').trim().toLowerCase();
      const filter = document.getElementById('filterSelect').value || 'all';
      let rows = allRows.slice();

      if(search){
        rows = rows.filter(r=>{
          const pn = String(r.part_number||'').toLowerCase();
          const desc = String(r.description||'').toLowerCase();
          return pn.includes(search) || desc.includes(search);
        });
      }
      if(filter === 'low'){
        rows = rows.filter(r=> Number(r.qty||0) <= 3);
      }

      const listBody = document.getElementById('listBody');
      if(!rows.length){
        listBody.innerHTML = `<div class="empty">No results.</div>`;
        return;
      }

      const user = getUser();
      const isAdmin = isAdminUser(user);

      listBody.innerHTML = rows.map(r=>{
        const pn = r.part_number || '';
        const desc = r.description || '';
        const qty = r.qty;
        return `
          <div class="row">
            <div class="mono"><b>${pn}</b></div>
            <div>${desc}</div>
            <div><span class="qty">${fmtQty(qty)}</span> ${stockPill(qty)}</div>
            <div class="actions">
              <button data-act="view" data-pn="${encodeURIComponent(pn)}">View</button>
              ${isAdmin ? `<button data-act="edit" data-pn="${encodeURIComponent(pn)}">Edit</button>` : ``}
              ${isAdmin ? `<button class="danger" data-act="del" data-pn="${encodeURIComponent(pn)}">Delete</button>` : ``}
            </div>
          </div>
        `;
      }).join('');

      listBody.querySelectorAll('button[data-act]').forEach(btn=>{
        btn.addEventListener('click', async ()=>{
          const act = btn.getAttribute('data-act');
          const pn = decodeURIComponent(btn.getAttribute('data-pn')||'');
          if(act === 'view'){
            showDetail(pn);
          }else if(act === 'edit'){
            openModal('edit', pn);
          }else if(act === 'del'){
            await delPart(pn);
          }
        });
      });
    }

    async function showDetail(partNumber){
      const listBody = document.getElementById('listBody');
      listBody.innerHTML = `<div class="empty">Loading…</div>`;
      try{
        const row = await api(`/inventory/${encodeURIComponent(partNumber)}`);
        currentDetail = row;
        const user = getUser();
        const isAdmin = isAdminUser(user);

        const pn = row.part_number || '';
        const desc = row.description || '';
        const notes = row.notes || '';
        const qtyVal = (row.qty != null) ? row.qty : 0;

        listBody.innerHTML = `
        <div class="detail-wrap">
          <div class="detail-qr-float" id="qrFloat">
            <div style="font-weight:700;font-size:12px;margin-bottom:6px;">QR Label</div>
            <canvas id="qrCanvas" width="120" height="120"></canvas>
            <div class="qr-part" id="qrPartText"></div>
            <div class="qr-name" id="qrNameText"></div>
            <div class="qr-btn"><button id="qrDownloadBtn" class="toolbar-btn red">Download PNG</button></div>
            <div class="qr-link">Scan: <span id="qrUrlText"></span></div>
          </div>

          <div class="detail-topbar">
            <button class="toolbar-btn red" id="backBtn">← Back</button>
            ${isAdmin ? `<button class="toolbar-btn red" id="editDetailBtn">Edit</button>` : ``}
          </div>

          <div class="detail-grid">
            <div><b>Description</b></div><div>${escapeHtml(desc)}</div>
            <div><b>Part #</b></div><div class="mono"><b>${escapeHtml(pn)}</b></div>
            <div><b>Quantity</b></div><div class="detail-qty">${escapeHtml(String(qtyVal))}</div>
            <div><b>Status</b></div><div>${stockPill(qtyVal)}</div>
            <div><b>Notes</b></div><div class="muted">${notes ? escapeHtml(notes) : '—'}</div>
          </div>
        </div>
        `;

        document.getElementById('backBtn').onclick = ()=> renderList();
        const editDetailBtn = document.getElementById('editDetailBtn');
        if(editDetailBtn) editDetailBtn.onclick = ()=> openModal('edit', pn);

        // QR
        try{
          const canvas = document.getElementById('qrCanvas');
          const partEl = document.getElementById('qrPartText');
          const nameEl = document.getElementById('qrNameText');
          const urlEl = document.getElementById('qrUrlText');
          const dlBtn = document.getElementById('qrDownloadBtn');
          if(!canvas || typeof QRCode === 'undefined') return;

          const invUrl = `${window.location.origin}/inv/${encodeURIComponent(partNumber)}`;
          const printName = desc;

          if(partEl) partEl.textContent = String(partNumber || '');
          if(nameEl) nameEl.textContent = String(printName || '');
          if(urlEl) urlEl.textContent = invUrl;

          QRCode.toCanvas(canvas, invUrl, { width: 120, margin: 1 }, (err)=>{
            if(err) console.error('QR error', err);
          });

          if(dlBtn){
          dlBtn.onclick = async ()=>{
            try{
              // Export a label-sized PNG that includes QR + part number + description (fits Panduit S200X650VA1Y).
              // Label is ~2.00" x 0.65". We export at 300 DPI for crisp text when pasted into Easy-Mark.
              const LABEL_W = 600;
              const LABEL_H = 195;

              const exportCanvas = document.createElement('canvas');
              exportCanvas.width = LABEL_W;
              exportCanvas.height = LABEL_H;
              const ctx = exportCanvas.getContext('2d');

              // white background
              ctx.fillStyle = '#ffffff';
              ctx.fillRect(0, 0, LABEL_W, LABEL_H);

              const qrTemp = document.createElement('canvas');
              const QR_SIZE = 140; // leaves room for two text lines underneath
              qrTemp.width = QR_SIZE;
              qrTemp.height = QR_SIZE;

              await new Promise((resolve, reject)=>{
                QRCode.toCanvas(qrTemp, invUrl, { width: QR_SIZE, margin: 1 }, (err)=>{
                  if(err) return reject(err);
                  resolve();
                });
              });

              // draw QR centered
              const qrX = Math.round((LABEL_W - QR_SIZE) / 2);
              const qrY = 6;
              ctx.drawImage(qrTemp, qrX, qrY, QR_SIZE, QR_SIZE);

              // text (centered)
              const partText = String(partNumber || '');
              const nameText = String(printName || '');

              ctx.textAlign = 'center';
              ctx.fillStyle = '#000000';

              // Part number (bold)
              ctx.font = 'bold 22px Arial';
              ctx.fillText(partText, LABEL_W / 2, 160);

              // Description (slightly smaller)
              ctx.font = 'normal 18px Arial';
              // simple truncate to keep it on one line in the label height
              const maxChars = 28;
              const safeName = nameText.length > maxChars ? (nameText.slice(0, maxChars - 1) + '…') : nameText;
              ctx.fillText(safeName, LABEL_W / 2, 185);

              const a = document.createElement('a');
              a.download = `${String(partNumber || 'label')}.png`;
              a.href = exportCanvas.toDataURL('image/png');
              a.click();
            }catch(e){
              console.error('Label export failed', e);
              alert('Failed to download label PNG');
            }
          };
        }
        }catch(e){
          console.error('QR init failed', e);
        }

      }catch(e){
        listBody.innerHTML = `<div class="empty">Error: ${e.message}</div>`;
      }
    }

    function escapeHtml(s){
      return String(s||'')
        .replaceAll('&','&amp;')
        .replaceAll('<','&lt;')
        .replaceAll('>','&gt;')
        .replaceAll('"','&quot;')
        .replaceAll("'","&#039;");
    }

    // modal handlers
    const backdrop = document.getElementById('modalBackdrop');
    const mPart = document.getElementById('mPart');
    const mQty  = document.getElementById('mQty');
    const mDesc = document.getElementById('mDesc');
    const mNotes= document.getElementById('mNotes');
    const modalTitle = document.getElementById('modalTitle');

    let modalMode = 'add';
    let editingPN = null;

    function openModal(mode, partNumber){
      modalMode = mode;
      editingPN = partNumber || null;
      if(mode === 'add'){
        modalTitle.textContent = 'Add Part';
        mPart.value = '';
        mQty.value = 0;
        mDesc.value = '';
        mNotes.value = '';
        mPart.disabled = false;
      }else{
        modalTitle.textContent = 'Edit Part';
        const row = allRows.find(r=> String(r.part_number) === String(partNumber)) || currentDetail || {};
        mPart.value = row.part_number || partNumber || '';
        mQty.value = row.qty != null ? row.qty : 0;
        mDesc.value = row.description || '';
        mNotes.value = row.notes || '';
        mPart.disabled = true;
      }
      backdrop.style.display = 'flex';
      setTimeout(()=> mDesc.focus(), 0);
    }
    function closeModal(){ backdrop.style.display = 'none'; }

    document.getElementById('cancelBtn').onclick = closeModal;
    backdrop.addEventListener('click', (e)=>{ if(e.target === backdrop) closeModal(); });

    document.getElementById('saveBtn').onclick = async ()=>{
      const pn = (mPart.value||'').trim();
      const qty = Number(mQty.value||0);
      const desc = (mDesc.value||'').trim();
      const notes = (mNotes.value||'').trim();
      if(!pn){ alert('Part number required'); return; }
      if(!desc){ alert('Description required'); return; }
      try{
        if(modalMode === 'add'){
          await api('/inventory', {method:'POST', body: JSON.stringify({part_number: pn, qty, description: desc, notes})});
        }else{
          await api(`/inventory/${encodeURIComponent(pn)}`, {method:'PUT', body: JSON.stringify({qty, description: desc, notes})});
        }
        closeModal();
        await loadList();
        // if we were on detail view, refresh it
        const q = qs('part');
        if(q) showDetail(q);
      }catch(e){
        alert(e.message);
      }
    };

    async function delPart(partNumber){
      if(!confirm(`Delete ${partNumber}?`)) return;
      try{
        await api(`/inventory/${encodeURIComponent(partNumber)}`, {method:'DELETE'});
        await loadList();
      }catch(e){
        alert(e.message);
      }
    }

    // UI wiring
    document.getElementById('searchBox').addEventListener('input', ()=> renderList());
    document.getElementById('filterSelect').addEventListener('change', ()=> renderList());
    document.getElementById('refreshBtn').addEventListener('click', ()=> loadList());

    document.getElementById('addBtn').addEventListener('click', ()=>{
      const user = getUser();
      if(!isAdminUser(user)){
        alert('Admin only');
        return;
      }
      openModal('add');
    });

    // init
    buildNav();
    loadList();
  </script>
</body>
</html>
