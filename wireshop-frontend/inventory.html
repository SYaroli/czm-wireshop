<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CZM Inventory</title>

<link rel="stylesheet" href="/style.css">
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>

<style>
.qr-box{
  text-align:center;
  padding:10px;
  border:1px solid #ddd;
  border-radius:6px;
  width:220px;
}
.qr-part{
  font-weight:bold;
  margin-top:6px;
}
.qr-name{
  font-size:12px;
}
</style>
</head>

<body>

<header>
<h2 id="title">Inventory</h2>
</header>

<main>

<div>

<div>
<strong>Description:</strong>
<span id="desc"></span>
</div>

<div>
<strong>Location:</strong>
<span id="loc"></span>
</div>

<div>
<strong>Qty:</strong>
<span id="qty"></span>
</div>

<div>
<strong>Min Qty:</strong>
<span id="minQty"></span>
</div>

<div>
<strong>Notes:</strong>
<span id="notes"></span>
</div>

</div>

<br>

<div class="qr-box">
<div>QR Label</div>
<canvas id="qrCanvas" width="180" height="180"></canvas>

<div id="qrPartText" class="qr-part"></div>
<div id="qrNameText" class="qr-name"></div>

<br>

<button id="qrDownloadBtn">Download PNG</button>

<div style="font-size:10px;margin-top:6px;">
<span id="qrUrlText"></span>
</div>

</div>

<br><br>

<div>
<h3>Adjust Inventory</h3>

<button id="btnMinus">-1</button>
<button id="btnPlus">+1</button>

<input id="qtyDelta" type="number">

<button id="btnApply">Apply</button>
</div>

<br>

<div>
<h3>Inventory Movement</h3>
<div id="movementBox">Loading...</div>
</div>

</main>

<script>

const API_BASE = ""

let currentPart = ""
let currentRow = null

function getPartFromRoute(){
const p = window.location.pathname.split("/")
return p[2] || ""
}

function getUser(){
return localStorage.getItem("username") || ""
}

function escapeHtml(str){
return String(str||"")
.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;")
}

currentPart = getPartFromRoute()

if(currentPart){
loadPart(currentPart)
loadMovement(currentPart)
}

async function loadPart(part){

const res = await fetch(`${API_BASE}/inventory/${encodeURIComponent(part)}`,{
headers:{ "x-user":getUser() }
})

const data = await res.json()

currentRow = data

document.getElementById("title").innerText = "Inventory — "+data.partNumber
document.getElementById("desc").innerText = data.printName || ""
document.getElementById("loc").innerText = data.location || ""
document.getElementById("qty").innerText = data.qty || ""
document.getElementById("minQty").innerText = data.minQty || ""
document.getElementById("notes").innerText = data.notes || ""

generatePartQr(data.partNumber,data.printName)

}

async function loadMovement(part){

const res = await fetch(`${API_BASE}/inventory/${encodeURIComponent(part)}/log`,{
headers:{ "x-user":getUser() }
})

const rows = await res.json()

if(!rows.length){
document.getElementById("movementBox").innerText="No movement yet"
return
}

let html="<table border=1 cellpadding=4><tr><th>Time</th><th>User</th><th>Delta</th><th>New Qty</th></tr>"

rows.forEach(r=>{

const t=new Date(r.ts||Date.now()).toLocaleString()

html+=`
<tr>
<td>${escapeHtml(t)}</td>
<td>${escapeHtml(r.user)}</td>
<td>${escapeHtml(r.delta)}</td>
<td>${escapeHtml(r.newQty)}</td>
</tr>
`

})

html+="</table>"

document.getElementById("movementBox").innerHTML=html

}

document.getElementById("btnMinus").onclick=()=>{
let v=Number(document.getElementById("qtyDelta").value||0)
document.getElementById("qtyDelta").value=v-1
}

document.getElementById("btnPlus").onclick=()=>{
let v=Number(document.getElementById("qtyDelta").value||0)
document.getElementById("qtyDelta").value=v+1
}

document.getElementById("btnApply").onclick=applyAdjust

async function applyAdjust(){

const delta=Number(document.getElementById("qtyDelta").value)

if(!delta) return alert("Enter amount")

const res=await fetch(`${API_BASE}/inventory/${encodeURIComponent(currentPart)}/adjust`,{

method:"POST",

headers:{
"Content-Type":"application/json",
"x-user":getUser()
},

body:JSON.stringify({delta})

})

await res.json()

document.getElementById("qtyDelta").value=""

loadPart(currentPart)
loadMovement(currentPart)

}

function generatePartQr(partNumber,printName){

const canvas=document.getElementById("qrCanvas")

const invUrl=`${window.location.origin}/inv/${encodeURIComponent(partNumber)}`

document.getElementById("qrPartText").innerText=partNumber
document.getElementById("qrNameText").innerText=printName
document.getElementById("qrUrlText").innerText=invUrl

QRCode.toCanvas(canvas,invUrl,{width:160})

document.getElementById("qrDownloadBtn").onclick=async()=>{

const DPI=300

const width=2*DPI
const height=6.5*DPI

const labelCanvas=document.createElement("canvas")

labelCanvas.width=width
labelCanvas.height=height

const ctx=labelCanvas.getContext("2d")

ctx.fillStyle="white"
ctx.fillRect(0,0,width,height)

const qrSize=width*0.82

const qrX=(width-qrSize)/2
const qrY=80

const temp=document.createElement("canvas")

await QRCode.toCanvas(temp,invUrl,{width:qrSize})

ctx.drawImage(temp,qrX,qrY)

ctx.fillStyle="black"
ctx.textAlign="center"

ctx.font="bold 60px Arial"

ctx.fillText(partNumber,width/2,qrY+qrSize+90)

ctx.font="40px Arial"

const words=(printName||"").split(" ")

const line1=words.slice(0,3).join(" ")
const line2=words.slice(3).join(" ")

ctx.fillText(line1,width/2,qrY+qrSize+150)

ctx.fillText(line2,width/2,qrY+qrSize+210)

const a=document.createElement("a")

a.download=partNumber+".png"

a.href=labelCanvas.toDataURL("image/png")

a.click()

}

}

</script>

</body>
</html>
