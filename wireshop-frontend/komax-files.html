<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CZM • Komax Files</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .brand-bar{background:#0f1114;border-bottom:4px solid #c30000}
    .brand-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:8px 12px}
    .brand-logo{display:flex;align-items:center;gap:10px;color:#fff;text-decoration:none}
    .brand-logo img{height:22px;opacity:.95}
    .brand-title{font-size:16px;margin:0;color:#fff}
    .brand-actions .navbtn{display:inline-block;background:#1a1c20;color:#bbb;padding:6px 12px;border-radius:10px;text-decoration:none;border:1px solid #3a3f44;font-weight:600;font-size:.9rem;cursor:pointer}
    .brand-actions .navbtn.active{background:#b30000;color:#fff;border-color:#ff4d4d}
    .brand-actions .navbtn:hover{background:#24272b;color:#fff}
    .brand-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    body{background:#eef0f3;margin:0}
    .page{max-width:1200px;margin:24px auto;padding:0 12px}
    .card{background:#fff;border-radius:8px;box-shadow:0 2px 4px rgba(0,0,0,.08);padding:20px;margin-bottom:16px}
    .upload-section{background:#f7f8fa;border:1px solid #dde1e7;border-radius:8px;padding:16px;margin-bottom:20px;}
    .upload-section h3{margin:0 0 12px;font-size:.95rem;color:#333;}
    .upload-row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;}
    .upload-row label{display:flex;flex-direction:column;gap:4px;font-size:.85rem;font-weight:600;color:#555;}
    .upload-row input[type="text"]{padding:7px 10px;border:1px solid #ccc;border-radius:6px;font-size:.9rem;width:220px;}
    .upload-row input[type="file"]{font-size:.85rem;}
    .upload-msg{margin-top:8px;font-size:.85rem;min-height:1.2em;}
    .file-table{width:100%;border-collapse:collapse;font-size:.9rem;}
    .file-table th{text-align:left;padding:9px 12px;background:#1e2226;color:#fff;}
    .file-table td{padding:9px 12px;border-bottom:1px solid rgba(128,128,128,.15);vertical-align:middle;}
    .file-table tr:hover td{background:rgba(0,0,0,.03);}
    .dl-btn{background:#1a6b3a;color:#fff;text-decoration:none;padding:6px 14px;border-radius:6px;font-weight:700;font-size:.85rem;white-space:nowrap;display:inline-block;border:none;cursor:pointer;}
    .dl-btn:hover{background:#155830;}
    .upd-btn{background:#1a4a8a;color:#fff;padding:6px 14px;border-radius:6px;font-weight:700;font-size:.85rem;white-space:nowrap;border:none;cursor:pointer;}
    .upd-btn:hover{background:#163d74;}
    .submit-btn{background:#b30000;color:#fff;padding:8px 18px;border-radius:6px;font-weight:700;font-size:.9rem;border:none;cursor:pointer;white-space:nowrap;}
    .submit-btn:hover{background:#900;}
    .btn-cell{display:flex;gap:6px;align-items:center;}
    .search-input{padding:8px 12px;border:1px solid #ccc;border-radius:6px;font-size:.95rem;width:100%;max-width:320px;box-sizing:border-box;}
    .empty{padding:24px;opacity:.6;text-align:center;}
    .top-row{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:16px;}
  </style>
</head>
<body>
  <div class="brand-bar">
    <div class="brand-inner">
      <a class="brand-logo" href="/dashboard.html">
        <img src="czm-logo.png" alt="CZM">
        <h1 class="brand-title">CZM • Komax Files</h1>
      </a>
      <div class="brand-actions">
        <a href="/dashboard.html" class="navbtn">Dashboard</a>
        <a href="/assignments.html" class="navbtn">Build Next</a>
        <a href="/inventory" class="navbtn">Inventory</a>
        <a href="/komax-files.html" class="navbtn active">Komax Files</a>
        <a href="/bench-stock.html" class="navbtn">Bench Stock</a>
        <a href="/admin.html" class="navbtn" id="adminNav" style="display:none;">Admin</a>
        <button id="logoutBtn" class="navbtn">Logout</button>
      </div>
    </div>
  </div>

  <main class="page">
    <div class="card">

      <!-- Upload form — admin only -->
      <div class="upload-section" id="uploadSection" style="display:none;">
        <h3>Add / Replace File</h3>
        <div class="upload-row">
          <label>Part Number
            <input type="text" id="upPartNumber" placeholder="e.g. 40602.1990.003" />
          </label>
          <label>Excel File (.xlsx / .xlsm)
            <input type="file" id="upFileInput" accept=".xlsx,.xlsm" />
          </label>
          <button class="submit-btn" id="upSubmitBtn">Upload</button>
        </div>
        <div class="upload-msg" id="upMsg"></div>
      </div>

      <div class="top-row">
        <div>
          <strong>Komax Job Files</strong>
          <div style="font-size:.85rem;opacity:.7;margin-top:2px;">Download the Excel cut/crimp file for any harness.</div>
        </div>
        <input class="search-input" id="searchInput" placeholder="Search part number or filename…" />
      </div>

      <div style="overflow-x:auto;">
        <table class="file-table">
          <thead>
            <tr>
              <th>Part Number</th>
              <th>Filename</th>
              <th>Uploaded By</th>
              <th>Uploaded</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="fileTbody">
            <tr><td colspan="5" class="empty">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- Hidden file input for per-row Update -->
  <input type="file" id="updateFileInput" accept=".xlsx,.xlsm" style="display:none;" />

  <script>
    const API_ROOT = 'https://wireshop-backend.onrender.com';

    let session = {};
    try { session = JSON.parse(localStorage.getItem('user') || '{}'); } catch {}
    if (!session.username) { location.href = 'index.html'; }

    const isAdmin = String(session.role || '').toLowerCase() === 'admin';

    if (isAdmin) {
      document.getElementById('adminNav').style.display = '';
      document.getElementById('uploadSection').style.display = '';
    }

    document.getElementById('logoutBtn').addEventListener('click', () => {
      localStorage.removeItem('user');
      location.href = 'index.html';
    });

    let allFiles = [];
    let updateTargetId = null;

    function escHtml(s) {
      return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function render(files) {
      const tbody = document.getElementById('fileTbody');
      if (!files.length) {
        tbody.innerHTML = '<tr><td colspan="5" class="empty">No files found.</td></tr>';
        return;
      }
      tbody.innerHTML = files.map(f => `
        <tr data-id="${f.id}">
          <td><a href="/inv/${encodeURIComponent(f.part_number)}" style="font-weight:700;color:inherit;">${escHtml(f.part_number)}</a></td>
          <td style="opacity:.85;">${escHtml(f.filename)}</td>
          <td>${escHtml(f.uploaded_by)}</td>
          <td style="font-size:.82rem;opacity:.7;">${escHtml(f.uploaded_at)}</td>
          <td>
            <div class="btn-cell">
              <a class="dl-btn" href="${API_ROOT}/api/komax-files/${f.id}/download">⬇ Download</a>
              ${isAdmin ? `<button class="upd-btn update-btn" data-id="${f.id}">↑ Update</button>` : ''}
            </div>
          </td>
        </tr>`).join('');

      if (isAdmin) {
        tbody.querySelectorAll('.update-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            updateTargetId = btn.dataset.id;
            document.getElementById('updateFileInput').click();
          });
        });
      }
    }

    async function load() {
      try {
        const res = await fetch(`${API_ROOT}/api/komax-files`, {
          headers: { 'x-user': session.username || '' }
        });
        allFiles = await res.json();
        render(allFiles);
      } catch(e) {
        document.getElementById('fileTbody').innerHTML =
          `<tr><td colspan="5" class="empty" style="color:red;">Failed to load: ${e.message}</td></tr>`;
      }
    }

    document.getElementById('searchInput').addEventListener('input', function() {
      const q = this.value.toLowerCase();
      render(q ? allFiles.filter(f =>
        f.part_number.toLowerCase().includes(q) ||
        f.filename.toLowerCase().includes(q)
      ) : allFiles);
    });

    document.getElementById('upSubmitBtn').addEventListener('click', () => {
      const pn  = document.getElementById('upPartNumber').value.trim();
      const fi  = document.getElementById('upFileInput').files[0];
      const msg = document.getElementById('upMsg');
      if (!pn) { msg.textContent = 'Enter a part number.'; return; }
      if (!fi) { msg.textContent = 'Select a file.'; return; }
      msg.textContent = 'Uploading…';
      const reader = new FileReader();
      reader.onload = async () => {
        try {
          const res = await fetch(`${API_ROOT}/api/komax-files`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'x-user': session.username || '' },
            body: JSON.stringify({ part_number: pn, filename: fi.name, file_data: reader.result.split(',')[1] })
          });
          const d = await res.json();
          if (d.ok) {
            msg.textContent = `✓ "${fi.name}" uploaded for ${pn}.`;
            document.getElementById('upPartNumber').value = '';
            document.getElementById('upFileInput').value  = '';
            load();
          } else { msg.textContent = 'Error: ' + (d.error || 'unknown'); }
        } catch(e) { msg.textContent = 'Upload failed: ' + e.message; }
      };
      reader.readAsDataURL(fi);
    });

    document.getElementById('updateFileInput').addEventListener('change', function() {
      const fi = this.files[0];
      if (!fi || !updateTargetId) return;
      const reader = new FileReader();
      reader.onload = async () => {
        try {
          const res = await fetch(`${API_ROOT}/api/komax-files/${updateTargetId}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', 'x-user': session.username || '' },
            body: JSON.stringify({ file_data: reader.result.split(',')[1], filename: fi.name })
          });
          const d = await res.json();
          if (d.ok) { load(); }
          else { alert('Update failed: ' + (d.error || 'unknown')); }
        } catch(e) { alert('Update failed: ' + e.message); }
        updateTargetId = null;
        this.value = '';
      };
      reader.readAsDataURL(fi);
    });

    load();
  </script>
</body>
</html>
