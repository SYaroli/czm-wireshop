<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CZM • Inventory Movement</title>
  <link rel="stylesheet" href="style.css" />
  <style>
  .toolbar label { display:flex; flex-direction:column; gap:4px; min-width:160px; }
  .statline { margin-top:8px; font-size:12px; display:flex; gap:16px; flex-wrap:wrap; }
  td.note { white-space:normal; min-width:220px; }
  .empty, .error { padding:14px 6px; font-size:13px; }
  .error { color:#b30000; }
</style>
</head>
<body>
  <div class="brand-bar">
    <div class="brand-inner">
      <a class="brand-logo" href="/dashboard.html">
        <img src="/czm-logo.png" alt="CZM">
        <h1 class="brand-title">CZM • Inventory Movement</h1>
      </a>
      <div class="brand-actions">
        <a class="navbtn" href="/assignments.html">Assignments</a>
        <a class="navbtn" href="/inventory.html">Inventory</a>
        <a class="navbtn" href="/komax-files.html">Komax Files</a>
        <a class="navbtn active" href="/admin.html">Admin</a>
        <button id="logoutBtn" class="navbtn">Logout</button>
      </div>
    </div>
  </div>

  <main>
    <div class="card">
      <div class="toolbar">
        <label>
          <span class="muted">Search part / description / user / note</span>
          <input id="searchBox" type="text" placeholder="48002, shane, removed, mast..." />
        </label>
        <label>
          <span class="muted">Direction</span>
          <select id="dirFilter">
            <option value="all">All</option>
            <option value="in">In only</option>
            <option value="out">Out only</option>
            <option value="same">No qty change</option>
          </select>
        </label>
        <label>
          <span class="muted">Rows</span>
          <select id="limitSel">
            <option value="250">250</option>
            <option value="500" selected>500</option>
            <option value="1000">1000</option>
            <option value="2000">2000</option>
            <option value="all">All</option>
          </select>
        </label>
        <button id="refreshBtn" type="button">Refresh</button>
        <button id="exportBtn" class="secondary" type="button">Export CSV</button>
      </div>
      <div id="stats" class="statline muted"></div>
    </div>

    <div class="card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Time</th>
              <th>Part</th>
              <th>Description</th>
              <th>User</th>
              <th>Direction</th>
              <th>Delta</th>
              <th>Before</th>
              <th>After</th>
              <th>Note</th>
            </tr>
          </thead>
          <tbody id="movementBody">
            <tr><td colspan="9" class="empty">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <script>
    const API_BASE = (localStorage.getItem("API_BASE") || "https://wireshop-backend.onrender.com").replace(/\/+$/, "");
    const MOVEMENT_API = API_BASE + "/api/inventory-log";
    const INVENTORY_API = API_BASE + "/api/inventory-all";
    let rawRows = [];
    let inventoryMap = new Map();

    function getSession() {
      try { return JSON.parse(localStorage.getItem("user") || "{}"); } catch { return {}; }
    }

    function requireAdmin() {
      const s = getSession();
      if (!s.username) {
        window.location.replace("index.html");
        return false;
      }
      if (s.role !== "admin") {
        window.location.replace("assignments.html");
        return false;
      }
      return true;
    }

    function authHeaders() {
      return { "Content-Type": "application/json", "x-user": getSession().username };
    }

    function logout() {
      localStorage.removeItem("user");
      window.location.replace("index.html");
    }

    function escapeHtml(s) {
      return String(s || "").replace(/[&<>"']/g, m => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[m]));
    }

    function formatTs(ts) {
      if (!ts) return "—";
      const d = new Date(Number(ts));
      if (Number.isNaN(d.getTime())) return String(ts);
      return d.toLocaleString();
    }

    function classify(delta) {
      const n = Number(delta || 0);
      if (n > 0) return "in";
      if (n < 0) return "out";
      return "same";
    }

    function directionChip(delta) {
      const dir = classify(delta);
      if (dir === "in") return '<span class="chip in">In</span>';
      if (dir === "out") return '<span class="chip out">Out</span>';
      return '<span class="chip same">No Change</span>';
    }

    function deltaHtml(delta) {
      const n = Number(delta || 0);
      const label = n > 0 ? ("+" + n) : String(n);
      if (n > 0) return `<span class="delta-pos">${label}</span>`;
      if (n < 0) return `<span class="delta-neg">${label}</span>`;
      return escapeHtml(label);
    }

    function csvEscape(v) {
      const s = String(v ?? "");
      return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
    }

    function renderRows() {
      const tbody = document.getElementById("movementBody");
      const search = (document.getElementById("searchBox").value || "").trim().toLowerCase();
      const dir = document.getElementById("dirFilter").value;

      let rows = rawRows.map(r => {
        const inv = inventoryMap.get(String(r.partNumber || "").toLowerCase()) || {};
        return {
          ...r,
          description: inv.description || "",
          location: inv.location || ""
        };
      });

      if (dir !== "all") {
        rows = rows.filter(r => classify(r.delta) === dir);
      }

      if (search) {
        rows = rows.filter(r => {
          const hay = [
            r.partNumber,
            r.description,
            r.location,
            r.user,
            r.note,
            r.before,
            r.after,
            r.delta
          ].join(" ").toLowerCase();
          return hay.includes(search);
        });
      }

      const totalIn = rows.reduce((sum, r) => sum + Math.max(0, Number(r.delta || 0)), 0);
      const totalOut = rows.reduce((sum, r) => sum + Math.abs(Math.min(0, Number(r.delta || 0))), 0);

      document.getElementById("stats").innerHTML = `
        <span><b>${rows.length}</b> rows shown</span>
        <span><b>${totalIn}</b> in</span>
        <span><b>${totalOut}</b> out</span>
      `;

      if (!rows.length) {
        tbody.innerHTML = '<tr><td colspan="9" class="empty">No movement found for that filter.</td></tr>';
        return;
      }

      tbody.innerHTML = rows.map(r => `
        <tr>
          <td>${escapeHtml(formatTs(r.when || r.ts))}</td>
          <td>${escapeHtml(r.partNumber)}</td>
          <td>${escapeHtml(r.description || "—")}</td>
          <td>${escapeHtml(r.user || "—")}</td>
          <td>${directionChip(r.delta)}</td>
          <td>${deltaHtml(r.delta)}</td>
          <td>${escapeHtml(r.before)}</td>
          <td>${escapeHtml(r.after)}</td>
          <td class="note">${escapeHtml(r.note || "")}</td>
        </tr>
      `).join("");
    }

    async function loadInventoryMap() {
      try {
        const res = await fetch(INVENTORY_API, { headers: authHeaders() });
        if (!res.ok) return;
        const items = await res.json();
        inventoryMap = new Map((items || []).map(item => [String(item.partNumber || "").toLowerCase(), item]));
      } catch (err) {
        console.warn("Inventory map load failed", err);
      }
    }

    async function loadMovement() {
      const tbody = document.getElementById("movementBody");
      tbody.innerHTML = '<tr><td colspan="9" class="empty">Loading…</td></tr>';

      try {
        const limitValue = String(document.getElementById("limitSel").value || "500");
        const url = limitValue === "all"
          ? MOVEMENT_API
          : (MOVEMENT_API + "?limit=" + encodeURIComponent(Number(limitValue)));

        await Promise.all([
          loadInventoryMap(),
          (async () => {
            const logRes = await fetch(url, { headers: authHeaders() });
            if (!logRes.ok) {
              let msg = "Failed to load movement";
              try {
                const data = await logRes.json();
                msg = data?.error || msg;
              } catch {}
              throw new Error(msg);
            }
            rawRows = await logRes.json();
          })()
        ]);

        renderRows();
      } catch (err) {
        console.error(err);
        tbody.innerHTML = '<tr><td colspan="9" class="error">' + escapeHtml(err.message || "Failed to load movement.") + "</td></tr>";
      }
    }

    function exportCsv() {
      const search = (document.getElementById("searchBox").value || "").trim().toLowerCase();
      const dir = document.getElementById("dirFilter").value;

      const rows = rawRows.map(r => {
        const inv = inventoryMap.get(String(r.partNumber || "").toLowerCase()) || {};
        return {
          time: formatTs(r.when || r.ts),
          partNumber: r.partNumber || "",
          description: inv.description || "",
          user: r.user || "",
          direction: classify(r.delta),
          delta: Number(r.delta || 0),
          before: Number(r.before || 0),
          after: Number(r.after || 0),
          note: r.note || ""
        };
      }).filter(r => {
        if (dir !== "all" && r.direction !== dir) return false;
        if (!search) return true;
        return [r.partNumber, r.description, r.user, r.note, r.delta, r.before, r.after].join(" ").toLowerCase().includes(search);
      });

      const lines = [
        ["Time", "Part Number", "Description", "User", "Direction", "Delta", "Before", "After", "Note"].join(",")
      ];

      rows.forEach(r => {
        lines.push([
          csvEscape(r.time),
          csvEscape(r.partNumber),
          csvEscape(r.description),
          csvEscape(r.user),
          csvEscape(r.direction),
          csvEscape(r.delta),
          csvEscape(r.before),
          csvEscape(r.after),
          csvEscape(r.note)
        ].join(","));
      });

      const blob = new Blob([lines.join("\n")], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "inventory-movement.csv";
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    document.getElementById("logoutBtn").addEventListener("click", logout);
    document.getElementById("refreshBtn").addEventListener("click", loadMovement);
    document.getElementById("exportBtn").addEventListener("click", exportCsv);
    document.getElementById("searchBox").addEventListener("input", renderRows);
    document.getElementById("dirFilter").addEventListener("change", renderRows);
    document.getElementById("limitSel").addEventListener("change", loadMovement);

    if (requireAdmin()) {
      loadMovement();
    }
  </script>
</body>
</html>
