name: Patch completed export date

on:
  push:
    paths:
      - '.github/workflows/patch-completed-date.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-completed-date:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Change completed export to date only
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('wireshop-frontend/assignments.html')
          text = path.read_text(encoding='utf-8')

          old = """    function fmtIso(tsMs){
              try { return new Date(tsMs).toISOString(); } catch { return ''; }
            }"""
          new = """    function fmtIso(tsMs){
              try {
                const d = new Date(tsMs);
                const pad = n => String(n).padStart(2,'0');
                return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
              } catch { return ''; }
            }"""

          if old not in text:
              raise SystemExit('Completed export formatter was not found; no file changed.')

          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY

      - name: Commit change
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add wireshop-frontend/assignments.html
          git commit -m "Export completed date without timestamp"
          git push
